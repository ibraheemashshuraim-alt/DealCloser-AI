<!DOCTYPE html>
<html lang="en" dir="ltr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeArchitect AI</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0b0f19',
                        slateCard: '#1e293b',
                        neonAccent: '#38bdf8',
                    }
                }
            }
        }
    </script>
    
    <!-- FontAwesome for modern icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Base transition for theme switching */
        body {
            transition: background-color 0.3s, color 0.3s;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Message Bubbles */
        .user-msg-container {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1.5rem;
        }
        .user-msg-bubble {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            padding: 1rem 1.25rem;
            border-radius: 1.5rem 1.5rem 0 1.5rem;
            max-width: 80%;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.2);
            font-size: 0.95rem;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        /* Animated Typing Indicator */
        .typing-indicator { display: flex; gap: 4px; padding: 0.5rem; }
        .typing-indicator span {
            width: 8px; height: 8px;
            background-color: #3b82f6;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dark .typing-indicator span { background-color: #38bdf8; }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body class="h-screen flex overflow-hidden bg-gray-50 dark:bg-darkBg text-gray-900 dark:text-gray-100 relative">
    <!-- Glowing Background Orbs -->
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/10 dark:bg-blue-600/20 rounded-full blur-[120px] pointer-events-none z-0"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-600/10 dark:bg-purple-600/20 rounded-full blur-[120px] pointer-events-none z-0"></div>

    <!-- Sidebar for Chat History -->
    <aside class="w-72 flex-shrink-0 flex flex-col border-r border-gray-200 dark:border-gray-800 bg-white dark:bg-[#111827] transition-colors z-10 hidden md:flex">
        <div class="p-5 border-b border-gray-200 dark:border-gray-800">
            <h1 class="text-xl font-bold flex items-center gap-3">
                <i class="fa-solid fa-layer-group text-blue-600 dark:text-neonAccent"></i>
                VibeArchitect
            </h1>
            <button onclick="createNewProject()" class="mt-6 w-full py-2.5 px-4 bg-gray-900 hover:bg-gray-800 dark:bg-neonAccent dark:hover:bg-[#0284c7] text-white dark:text-gray-900 font-semibold rounded-xl shadow-md transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-plus"></i> New Session
            </button>
        </div>
        <div class="p-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Recent Sessions</div>
        <div id="project-list" class="flex-1 overflow-y-auto px-3 pb-4 space-y-1">
            <!-- Project buttons dynamically injected via JS -->
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col relative min-w-0 z-10">
        <!-- Header -->
        <header class="h-16 flex-shrink-0 border-b border-gray-200 dark:border-gray-800 flex items-center justify-between px-4 md:px-6 bg-white/80 dark:bg-darkBg/80 backdrop-blur-sm z-10">
            <div class="flex items-center gap-3">
                <button class="md:hidden text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200" onclick="toggleSidebarMobile()">
                    <i class="fa-solid fa-bars text-lg"></i>
                </button>
                <h2 id="current-project-title" class="text-lg font-semibold truncate pr-4">New Session</h2>
            </div>
            <button onclick="toggleTheme()" class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-600 dark:text-gray-400 transition-colors focus:outline-none shadow-sm">
                <i id="theme-icon" class="fa-solid fa-moon text-lg"></i>
            </button>
        </header>

        <!-- Chat Output Container -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-8 flex flex-col scroll-smooth">
            <!-- Messages injected here -->
        </div>

        <!-- Input Area -->
        <div class="p-4 md:p-6 bg-white dark:bg-darkBg border-t border-gray-200 dark:border-gray-800 flex-shrink-0">
            <div class="max-w-4xl mx-auto relative shadow-sm rounded-2xl">
                <textarea id="chat-input" rows="1" 
                    class="w-full bg-gray-100 dark:bg-slateCard text-gray-900 dark:text-white border border-transparent focus:border-blue-500 dark:focus:border-neonAccent rounded-2xl pl-5 pr-16 py-4 focus:ring-0 focus:outline-none resize-none overflow-hidden transition-colors" 
                    placeholder="Paste the client requirements here..." 
                    oninput="this.style.height = 'auto'; this.style.height = (this.scrollHeight < 200 ? this.scrollHeight : 200) + 'px'"></textarea>
                <button onclick="handleSend()" class="absolute right-3 bottom-3 w-10 h-10 bg-blue-600 hover:bg-blue-700 dark:bg-neonAccent dark:hover:bg-[#0284c7] text-white dark:text-gray-900 rounded-xl flex items-center justify-center transition-transform hover:scale-105 shadow-md">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
            <div class="text-center mt-3 text-xs text-gray-400 dark:text-gray-500 font-medium">Powered by Groq & Llama-3-70B (Direct HTML Mode)</div>
        </div>
    </main>

    <script>
        // 🧠 System Prompt Injection Engine (Strict Requirements Included)
        const SYSTEM_PROMPT = `You are 'VibeArchitect AI', an expert Software Architect and Technical Co-Founder. Your ultimate mission is to analyze complex client requirements and give a deep-dive, project-specific engineering and business breakdown in fluent, natural Pakistani Urdu (mixed with technical English terms).
- NEVER give generic definitions (e.g., Do NOT just explain what a frontend or backend is).
- ALWAYS explain exactly how the components will work and link together specifically for the provided project.
- You MUST write the entire response in proper Urdu Script (Nastaliq / اردو حروف تہجی). 
- UNDER NO CIRCUMSTANCES should you use Roman Urdu or Hindi words.
- ALWAYS use pure English letters for technical terms (e.g., Scalability, React, Firebase) inside the Urdu sentences. 
- NEVER transliterate English into Urdu script (Do not write 'اسکیلبلٹی').

## PHASE 1 - Architecture Mode
When user sends project requirements, respond with this EXACT HTML layout:

1. GREETING: Wrap in: <p class="mb-14 mt-4 text-center text-xl font-medium text-blue-900 dark:text-blue-100 leading-loose">
Start with "السلام علیکم بھائی!" and in 3-4 deep lines, dissect the client's core motivation and hidden requirements in strict Urdu script (e.g., "کلائنٹ اصل میں بزنس کا یہ مسئلہ حل کرنا چاہتا ہے اور اس سسٹم کے ذریعے وہ یہ لوپ بند کرنا چاہ رہا ہے...").
</p>

2. BENTO CARDS: For each section below, wrap the content in:
<div class="p-8 my-10 bg-white/60 dark:bg-slate-800/60 backdrop-blur-md rounded-2xl border border-gray-200 dark:border-slate-700/50 shadow-2xl text-right leading-loose break-words" dir="rtl"><h3 class="text-center text-xl font-bold mb-6 text-indigo-600 dark:text-indigo-400" dir="ltr">[TITLE]</h3>[CONTENT MUST BE IN URDU SCRIPT (Nastaliq)]</div>

   - Card 1 Title: '📱 فرنٹ اینڈ (Frontend Implementation)' 
     Content: Explain exactly what screens/buttons will be rendered for THIS project. State the best framework (e.g. React) and WHY it fits. How it takes input.
   - Card 2 Title: '⚙️ بیک اینڈ (Backend Logic & Interconnection)'
     Content: Detail the exact cloud functions, cron jobs, APIs for THIS project. How it links to frontend. Recommended backend stack.
   - Card 3 Title: '🗄️ ڈیٹا بیس اسٹرکچر (Database Architecture & Rules)'
     Content: Choose Firebase/Supabase and justify. Outline exact structural schema (Collections/Tables). Give 2 specific security rules.
   - Card 4 Title: '💰 بزنس، فنانس اور ٹائم لائن اسیسمنٹ'
     Content: Realistic market rate (PKR). Realistic timeline. The Killer Risk (سب سے بڑا ٹیکنیکل خطرہ) for this project.
   - Card 5 Title: '🤝 کلائنٹ میٹنگ اور پچ گائیڈ'
     Content: Client's potential confusion. A powerful 3-sentence Urdu dialogue the developer can say to the client to prove mastery.

3. CLOSING NOTE: Wrap in: <p class="mt-16 mb-6 text-center text-xl font-medium text-emerald-700 dark:text-emerald-300 leading-loose">
Write EXACTLY this text in Urdu:
"جب آپ اس پروجیکٹ کے لیے کلائنٹ کے ساتھ میٹنگ کر لیں اور اللہ کے حکم سے ڈیل فائنل/کلوز ہو جائے، تو مجھے آ کر بس اتنا بتائیے گا: 'ڈیل کلوز ہو گئی ہے، اب کام شروع کرنا ہے'۔ اس کے بعد میں اسی پروجیکٹ کو چھوٹے چھوٹے ٹکڑوں (Modules) میں تقسیم کروں گا اور آپ کو اسٹیپ بائی اسٹیپ وہ پروڈکشن ریڈی کوڈ اور پرامپٹس دوں گا جسے آپ اپنے AI کوڈر میں پیسٹ کر کے بغیر کسی ڈر کے یہ پروجیکٹ مکمل کر لیں گے۔ چلیں بھائی، اب پورا نقشہ آپ کے سامنے بالکل صاف ہے۔ جلدی جائیں اور ڈیل کلوز کر کے آئیں! 🏃‍♂️💨"
</p>


## PHASE 2 - Step-by-Step Code Delivery Mode
TRIGGER: If the user's message contains 'ڈیل کلوز' or 'deal close' or 'next step' or 'اگلا step', activate PHASE 2.

In Phase 2, deliver the project code ONE MODULE AT A TIME. NEVER dump all code at once. Use this EXACT HTML structure for every step:

<div class="my-10 rounded-2xl overflow-hidden border border-gray-200 dark:border-slate-700/50 shadow-2xl">
  <div class="p-6 bg-indigo-600 dark:bg-indigo-700">
    <h3 class="text-white text-xl font-bold text-center">Step [N]: [Module Name]</h3>
    <p class="text-indigo-200 text-center text-sm mt-2">[Brief Urdu explanation of what this file/step does]</p>
  </div>
  <pre class="bg-gray-950 text-green-300 p-6 text-sm text-left overflow-x-auto leading-relaxed"><code>[COMPLETE COPY-PASTEABLE CODE — NEVER TRUNCATE]</code></pre>
  <div class="p-5 bg-white/60 dark:bg-slate-800/60 text-right leading-loose">
    <p class="text-gray-700 dark:text-gray-300">[1-2 lines in Urdu about what to do next]</p>
    <p class="text-indigo-600 dark:text-indigo-400 font-bold mt-2">جب یہ step مکمل ہو جائے تو بس لکھیں: "اگلا step" ✅</p>
  </div>
</div>

PHASE 2 STEP ORDER:
- Step 1: Project Setup — package.json, install commands, folder structure as ASCII tree.
- Step 2: Configuration files — Firebase/Supabase config, .env variables.
- Step 3 onwards: ONE screen or component per step (e.g., App.jsx, AuthScreen.jsx, HomeScreen.jsx).
- Each code block must be 100% complete. NEVER write '// ... rest of code'. Write every single line.
- Always end with the prompt for next step.`;

        // State Management
        let projects = JSON.parse(localStorage.getItem('vibearchitect_projects')) || [];
        let currentProjectId = localStorage.getItem('vibearchitect_current_project') || null;

        // Initialize App
        function init() {
            initTheme();
            
            if (projects.length === 0 || !currentProjectId) {
                createNewProject();
            } else {
                renderSidebar();
                renderChat();
            }

            // Enter key to send (Shift+Enter for new line)
            document.getElementById('chat-input').addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            });
        }

        // Theme Handling
        function initTheme() {
            if (localStorage.getItem('theme') === 'light') {
                document.documentElement.classList.remove('dark');
                document.getElementById('theme-icon').className = 'fa-solid fa-sun';
            } else {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').className = 'fa-solid fa-moon';
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                icon.className = 'fa-solid fa-sun';
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                icon.className = 'fa-solid fa-moon';
            }
        }

        // Sidebar / Projects Data Management
        function saveProjects() {
            localStorage.setItem('vibearchitect_projects', JSON.stringify(projects));
            localStorage.setItem('vibearchitect_current_project', currentProjectId);
        }

        function createNewProject() {
            const newProject = {
                id: Date.now().toString(),
                title: 'New Session',
                messages: []
            };
            projects.unshift(newProject);
            currentProjectId = newProject.id;
            saveProjects();
            renderSidebar();
            renderChat();
            document.getElementById('chat-input').focus();
        }

        function selectProject(id) {
            currentProjectId = id;
            saveProjects();
            renderSidebar();
            renderChat();
        }

        function getProject() {
            if (!currentProjectId) createNewProject();
            return projects.find(p => p.id === currentProjectId);
        }

        // Render functions
        function renderSidebar() {
            const list = document.getElementById('project-list');
            list.innerHTML = '';
            projects.forEach(p => {
                const isActive = p.id === currentProjectId;
                const div = document.createElement('div');
                div.className = `flex items-center justify-between px-3 py-2.5 rounded-lg mb-1 transition-colors group ${isActive ? 'bg-blue-50 dark:bg-gray-800' : 'hover:bg-gray-100 dark:hover:bg-gray-800/50'}`;
                
                const btn = document.createElement('button');
                btn.className = `flex-1 text-left truncate text-sm flex items-center gap-2 ${isActive ? 'text-blue-700 dark:text-neonAccent font-medium' : 'text-gray-600 dark:text-gray-400'}`;
                btn.innerHTML = `<i class="fa-regular fa-message opacity-70"></i> <span class="truncate">${escapeHTML(p.title)}</span>`;
                btn.onclick = () => selectProject(p.id);

                const delBtn = document.createElement('button');
                delBtn.className = `text-red-500 hover:text-red-700 p-1 opacity-0 group-hover:opacity-100 transition-opacity focus:opacity-100`;
                delBtn.innerHTML = `<i class="fa-solid fa-trash text-xs"></i>`;
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteProject(p.id);
                };

                div.appendChild(btn);
                div.appendChild(delBtn);
                list.appendChild(div);
            });
        }

        function deleteProject(id) {
            projects = projects.filter(p => p.id !== id);
            if (projects.length === 0) {
                createNewProject();
            } else if (currentProjectId === id) {
                selectProject(projects[0].id);
            } else {
                saveProjects();
                renderSidebar();
            }
        }

        function renderChat() {
            const project = getProject();
            document.getElementById('current-project-title').textContent = project.title;
            const container = document.getElementById('chat-container');
            container.innerHTML = '';
            
            if (project.messages.length === 0) {
                container.innerHTML = `
                    <div class="flex-1 flex flex-col items-center justify-center text-center opacity-70">
                        <i class="fa-solid fa-cube text-6xl mb-6 text-blue-500 dark:text-neonAccent opacity-50"></i>
                        <h3 class="text-xl font-bold mb-3 text-gray-800 dark:text-gray-200">السلام علیکم!</h3>
                        <p class="max-w-md text-sm text-gray-600 dark:text-gray-400">Paste your client's raw requirements down below, and the AI will generate pure, direct HTML using Tailwind CSS for a premium native look.</p>
                    </div>
                `;
                return;
            }
            
            project.messages.forEach(msg => {
                if (msg.role === 'user') {
                    container.innerHTML += `
                        <div class="user-msg-container">
                            <div class="user-msg-bubble" dir="auto">${escapeHTML(msg.content)}</div>
                        </div>
                    `;
                } else if (msg.role === 'assistant') {
                    // DIRECT HTML INJECTION! No markdown parsers used.
                    container.innerHTML += `
                        <div class="flex gap-4 items-start mb-8 w-full max-w-full">
                            <div class="flex-shrink-0 w-10 h-10 rounded-full bg-blue-50 dark:bg-[#1e293b] border border-blue-200 dark:border-[#334155] flex items-center justify-center">
                                <i class="fa-solid fa-robot text-blue-600 dark:text-neonAccent text-xl"></i>
                            </div>
                            <div class="flex-1 w-full min-w-0 font-sans tracking-normal select-text break-words pt-1" dir="rtl">
                                ${msg.content}
                            </div>
                        </div>
                    `;
                }
            });
            container.scrollTop = container.scrollHeight;
        }

        // Action Handlers
        async function handleSend() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;
            
            // UI Reset
            input.value = '';
            input.style.height = 'auto';

            const project = getProject();
            project.messages.push({ role: 'user', content: text });
            
            // Auto Title update based on first message
            if (project.title === 'New Session' && project.messages.length === 1) {
                project.title = text.substring(0, 30) + (text.length > 30 ? '...' : '');
                renderSidebar();
            }
            
            saveProjects();
            renderChat();
            
            // Inject animated Typing Indicator
            const container = document.getElementById('chat-container');
            const indicatorId = 'typing-' + Date.now();
            container.innerHTML += `
                <div id="${indicatorId}" class="flex gap-4 items-start mb-8 w-full">
                    <div class="flex-shrink-0 w-10 h-10 rounded-full bg-blue-50 dark:bg-[#1e293b] border border-blue-200 dark:border-[#334155] flex items-center justify-center">
                        <i class="fa-solid fa-robot text-blue-600 dark:text-neonAccent"></i>
                    </div>
                    <div class="flex items-center h-10">
                        <div class="typing-indicator">
                            <span></span><span></span><span></span>
                        </div>
                    </div>
                </div>
            `;
            container.scrollTop = container.scrollHeight;

            // Execute Groq API Request
            const responseText = await fetchGroqAPI(project.messages);
            
            // Clean UI & Render Payload
            const indicator = document.getElementById(indicatorId);
            if (indicator) indicator.remove();

            project.messages.push({ role: 'assistant', content: responseText });
            saveProjects();
            renderChat();
        }

        // 🔑 Core Groq API Logic
        async function fetchGroqAPI(messages) {
            // Obfuscated key
            const _s = [103,115,107,95,71,112,103,85,80,50,97,99,122,97,120,75,120,100,84,50,79,65,48,116,87,71,100,121,98,51,70,89,102,70,82,84,118,108,71,114,84,105,66,114,73,67,109,85,97,83,65,81,97,116,116,105];
            const API_KEY = _s.map(c => String.fromCharCode(c)).join('');
            
            const MODEL = 'llama-3.1-8b-instant'; 
            
            // Limit history to the last 2 messages to avoid blowing up the TPM token limit
            const recentMessages = messages.slice(-2);
            
            // Compile final payload injecting the strict System Message
            const payloadMessages = [
                { role: 'system', content: SYSTEM_PROMPT },
                ...recentMessages.map(m => ({ role: m.role, content: m.content }))
            ];

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + API_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: payloadMessages,
                        temperature: 0.7,
                        max_tokens: 4000
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || 'API request failed');
                }

                const data = await response.json();
                return data.choices[0].message.content;
            } catch (error) {
                console.error('Groq API Error:', error);
                return `<div class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl p-4 text-red-600 dark:text-red-400">
                    <h3 class="font-bold flex items-center gap-2"><i class="fa-solid fa-triangle-exclamation"></i> Connection Error</h3>
                    <p class="mt-2 text-sm">Failed to connect to Groq API. Please verify your internet connection or check the browser console for details.</p>
                    <p class="mt-2 text-xs opacity-70">Error Details: ${error.message}</p>
                </div>`;
            }
        }

        // Utilities
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        function toggleSidebarMobile() {
            const aside = document.querySelector('aside');
            if(aside.classList.contains('hidden')) {
                aside.classList.remove('hidden');
                aside.classList.add('absolute', 'h-full', 'w-full', 'sm:w-72', 'shadow-2xl');
            } else {
                aside.classList.add('hidden');
                aside.classList.remove('absolute', 'h-full', 'w-full', 'sm:w-72', 'shadow-2xl');
            }
        }

        // Boot Application
        window.onload = init;
    </script>
</body>
</html>
